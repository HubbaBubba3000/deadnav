version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: task_scheduler_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: task_scheduler
      MYSQL_USER: scheduler
      MYSQL_PASSWORD: scheduler_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - task_scheduler_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_scheduler_api
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: scheduler
      DB_PASSWORD: scheduler_password
      DB_NAME: task_scheduler
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - task_scheduler_network

networks:
  task_scheduler_network:
    driver: bridge

volumes:
  mysql_data:
